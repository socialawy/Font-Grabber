name: Jules Maintenance

on:
  schedule:
    - cron: '0 */1 * * *' # Run every hour (24 tasks per day per project)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  jules-maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Invoke Jules
        uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          prompt: |
            Perform a routine maintenance sweep:
            1. Check for and update outdated dependencies in requirements.txt.
            2. Scan for and fix any linting or formatting issues.
            3. Review the ROADMAP in README.md and implement one small, non-breaking feature or improvement.
            4. Ensure all documentation is up to date and consistent.
            
            Always create a clean, descriptive pull request for your changes.
